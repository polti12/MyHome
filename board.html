<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자유 게시판 | COMMUNITY</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;400;600;800&display=swap"
        rel="stylesheet">
</head>

<body style="background-color: var(--dark-bg); color: var(--text-white);">

    <nav id="navbar" class="scrolled">
        <div class="nav-container">
            <div class="logo">COMMUNITY</div>
            <ul class="nav-links" style="align-items: center;">
                <li>
                    <a href="index.html" class="btn-back-premium">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:2px;">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg>
                        포트폴리오 돌아가기
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <section id="board" class="section" style="padding-top: 150px; min-height: 100vh;">
        <div class="container">
            <div class="section-header"
                style="display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:20px;">
                <div style="flex:1;">
                    <h2 class="section-subtitle">04. COMMUNITY</h2>
                    <h3 class="section-title">자유 게시판</h3>
                    <p style="color: var(--text-silver); margin-top: 15px;">관련 정보나 질문, 피드백을 자유롭게 남겨주세요. 입력 데이터는 브라우저 로컬
                        스토리지에 유지됩니다.</p>
                </div>
                <div style="display:flex; gap:10px;">
                    <!-- 버튼 비활성화 됨 (항상 보이기 기준 적용) -->
                </div>
            </div>

            <!-- 기본 노출되는 폼 -->
            <div class="board-form-card" id="board-form-container" style="display: block; transition: all 0.3s ease;">
                <form id="post-form" class="board-form">
                    <div class="form-row">
                        <div class="input-group">
                            <input type="text" id="name" required placeholder="이름 (Name)">
                        </div>
                        <div class="input-group">
                            <input type="email" id="email" placeholder="이메일 (선택)">
                        </div>
                        <div class="input-group">
                            <input type="password" id="password" required placeholder="비밀번호 (수정/삭제용)">
                        </div>
                    </div>
                    <div class="input-group full-width">
                        <input type="text" id="title" required placeholder="게시글 제목 (Title)">
                    </div>
                    <div class="input-group full-width">
                        <textarea id="content" rows="5" required placeholder="관련 정보나 요청사항 등 자유롭게 작성해주세요."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-submit" style="margin-top: 10px;">게시글 등록</button>
                </form>
            </div>

            <!-- 게시글 리스트 -->
            <div class="board-list-area" style="transition-delay: 0.1s; margin-top: 60px;">
                <h4
                    style="font-size: 1.5rem; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; color: var(--text-white);">
                    등록된 게시글</h4>
                <div id="post-list" class="post-list">
                    <!-- 게시글 영역 -->
                </div>
            </div>
        </div>
    </section>

    <footer class="section contact"
        style="padding: 50px 0; border-top: 1px solid rgba(255,255,255,0.05); margin-top: auto;">
        <div class="container text-center" style="text-align: center;">
            <p>&copy; 2024 HAN JI-HOON Portfolio. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Firebase를 임포트하기 위해 type="module" 추가 -->
    <script type="module" src="board.js"></script>
</body>

</html>
